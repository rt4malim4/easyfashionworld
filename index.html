<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>easyfashionworld</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #fff;
  overflow-x: hidden;
  background: black;
}

/* Glitzer Hintergrund */
.stars, .stars2, .stars3 {
  position: fixed;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;
  background: transparent;
  display: block;
}

.stars {
  background-image: radial-gradient(2px 2px at 20px 30px, white, transparent),
                    radial-gradient(2px 2px at 40px 70px, white, transparent),
                    radial-gradient(1px 1px at 90px 40px, white, transparent);
  animation: moveStars 50s linear infinite;
  opacity: 0.5;
}

.stars2 {
  background-image: radial-gradient(1px 1px at 50px 80px, #ff66ff, transparent),
                    radial-gradient(1px 1px at 120px 20px, #66ffff, transparent);
  animation: moveStars 100s linear infinite;
  opacity: 0.4;
}

.stars3 {
  background-image: radial-gradient(1px 1px at 10px 10px, #ffff66, transparent),
                    radial-gradient(2px 2px at 150px 90px, #ff9966, transparent);
  animation: moveStars 150s linear infinite;
  opacity: 0.3;
}

@keyframes moveStars {
  from {transform: translateY(0px);}
  to {transform: translateY(-1000px);}
}

.container {
  position: relative;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 32px;
}

input, select, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  background: #ff4dd2;
  color: white;
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
}

.outfit {
  margin-bottom: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

.small {
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="container">
  <h1>✨ easyfashionworld</h1>
  <p style="text-align:center;">Deine KI Modeberaterin für perfekte Outfits</p>

  <div class="card">
    <input id="weather" placeholder="Wetter (z.B. sonnig, kalt, regen)" />
    <input id="event" placeholder="Anlass (z.B. Schule, Party, Business)" />

    <select id="gender">
      <option value="unisex">Unisex</option>
      <option value="male">Männlich</option>
      <option value="female">Weiblich</option>
    </select>

    <input id="age" type="number" placeholder="Alter" />

    <button onclick="generateOutfits()">Outfits generieren</button>
    <button onclick="newSuggestions()">Neue Vorschläge</button>
  </div>

  <div id="results"></div>
  <div class="card">
    <h3>⭐ Favoriten</h3>
    <div id="favorites"></div>
  </div>
</div>

<script>
let lastOutfits = [];

function generateOutfits() {
  const weather = document.getElementById("weather").value.toLowerCase();
  const event = document.getElementById("event").value.toLowerCase();
  const gender = document.getElementById("gender").value;
  const age = parseInt(document.getElementById("age").value);

  lastOutfits = createOutfits(weather, event, gender, age);
  renderOutfits(lastOutfits);
}

function newSuggestions() {
  if (lastOutfits.length > 0) {
    const weather = document.getElementById("weather").value.toLowerCase();
    const event = document.getElementById("event").value.toLowerCase();
    const gender = document.getElementById("gender").value;
    const age = parseInt(document.getElementById("age").value);

    lastOutfits = createOutfits(weather, event, gender, age, true);
    renderOutfits(lastOutfits);
  }
}

function createOutfits(weather, event, gender, age, random=false) {
  const styles = ["Streetwear", "Casual", "Elegant", "Sportlich", "Minimalistisch"];
  const colors = ["Schwarz + Weiß", "Beige + Braun", "Blau + Grau", "Pastellfarben", "Neon Akzente"];

  let outfits = [];

  for (let i = 0; i < 3; i++) {
    let style = styles[Math.floor(Math.random()*styles.length)];
    let color = colors[Math.floor(Math.random()*colors.length)];

    if (age < 18) style = "Jugendlich " + style;
    if (age > 30) style = "Erwachsen " + style;

    if (weather.includes("regen")) {
      style += " + wasserfest";
    }
    if (weather.includes("kalt")) {
      style += " + warm layering";
    }
    if (event.includes("party")) {
      style += " + auffällig";
    }

    let outfit = {
      title: style + " Look",
      items: [
        "Oberteil: " + (gender === "female" ? "Bluse / Top" : gender === "male" ? "Shirt / Hemd" : "Basic Shirt"),
        "Unterteil: Jeans oder Stoffhose",
        "Schuhe: Sneakers oder Boots",
        "Accessoire: passende Uhr / Tasche"
      ],
      colors: color,
      tips: "Ideal für " + event + " bei " + weather + "."
    };

    outfits.push(outfit);
  }

  return outfits;
}

function renderOutfits(outfits) {
  const div = document.getElementById("results");
  div.innerHTML = "";

  outfits.forEach((o, index) => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h3>${o.title}</h3>
      <p><b>Farben:</b> ${o.colors}</p>
      <ul>
        ${o.items.map(i => `<li>${i}</li>`).join("")}
      </ul>
      <p class="small">${o.tips}</p>
      <button onclick='saveFavorite(${JSON.stringify(o).replace(/"/g, "&quot;")})'>⭐ Speichern</button>
    `;

    div.appendChild(el);
  });
}

function saveFavorite(outfit) {
  let fav = JSON.parse(localStorage.getItem("fav") || "[]");
  fav.push(outfit);
  localStorage.setItem("fav", JSON.stringify(fav));
  loadFavorites();
}

function loadFavorites() {
  let fav = JSON.parse(localStorage.getItem("fav") || "[]");
  const div = document.getElementById("favorites");
  div.innerHTML = "";

  fav.forEach(f => {
    const el = document.createElement("div");
    el.className = "outfit";
    el.innerHTML = `<b>${f.title}</b><br><small>${f.colors}</small>`;
    div.appendChild(el);
  });
}

loadFavorites();
</script>

</body>
</html>
