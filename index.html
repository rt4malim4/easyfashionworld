<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>easyfashionworld</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
}

#sparkles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.sparkle{
position:absolute;
background:gold;
border-radius:50%;
animation:fall linear infinite;
opacity:0.7;
}

@keyframes fall{
0%{transform:translateY(100vh);opacity:0;}
100%{transform:translateY(-100px);opacity:1;}
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
color:gold;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.card{
background:#151515;
padding:15px;
border-radius:15px;
border:1px solid #333;
}

select,input,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:gold;
font-weight:bold;
cursor:pointer;
}

.outfit{
background:#1b1b1b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.item{
margin:8px 0;
padding:8px;
background:#222;
border-radius:8px;
}

img{
width:100%;
border-radius:10px;
margin-top:5px;
}

a{
color:gold;
text-decoration:none;
font-size:12px;
}

.small{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div id="sparkles"></div>

<h1>easyfashionworld</h1>

<div class="container">

<div class="grid">

<!-- LEFT PANEL -->
<div class="card">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Unisex</option>
</select>

<label>Age</label>
<input id="ageRange" type="range" min="0" max="100" value="18"
oninput="syncAge(this.value)">

<select id="ageSelect" onchange="syncAge(this.value)"></select>

<div class="small">Selected Age: <span id="ageDisplay">18</span></div>

<label>Weather</label>
<select id="weather">
<option>Hot</option>
<option>Warm</option>
<option>Cold</option>
<option>Rainy</option>
</select>

<label>Event</label>
<select id="event">
<option>School</option>
<option>Work</option>
<option>Party</option>
<option>Date</option>
<option>Sport</option>
</select>

<label>Style</label>
<select id="style">
<option>Old Money</option>
<option>Casual / Minimalistic</option>
<option>Clean</option>
<option>Streetwear</option>
<option>Y2K</option>
<option>Downtown</option>
<option>Preppy</option>
</select>

<button onclick="generate()">Generate Outfits</button>

</div>

<!-- RIGHT PANEL -->
<div class="card">
<h2>Outfits</h2>
<div id="outfits"></div>
</div>

</div>
</div>

<script>

/* GLITTER */
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.width=Math.random()*4+"px";
s.style.height=s.style.width;
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(Math.random()*8+5)+"s";
document.getElementById("sparkles").appendChild(s);
}

/* AGE DROPDOWN */
const ageSelect=document.getElementById("ageSelect");

for(let i=0;i<=100;i++){
let opt=document.createElement("option");
opt.value=i;
opt.textContent=i;
ageSelect.appendChild(opt);
}

ageSelect.value=18;

/* SYNC AGE */
function syncAge(val){
document.getElementById("ageRange").value=val;
document.getElementById("ageSelect").value=val;
document.getElementById("ageDisplay").innerText=val;
}

/* AGE GROUP */
function ageGroup(age){
if(age<=19)return"Teen";
if(age<=30)return"Young Adult";
return"Adult";
}

/* DATABASE (AI READY) */
const db=[
{
style:"Streetwear",
gender:["Male","Female","Unisex"],
age:["Teen","Young Adult"],
weather:["Warm","Hot"],
event:["School","Party","Sport"],
score:8,
top:"Oversized Tee",
bottom:"Cargo Pants",
shoes:"Nike Sneakers",
accessory:"Crossbody Bag",
imgTop:"https://images.unsplash.com/photo-1520975922284-9c5c2f8b6f56",
imgBottom:"https://images.unsplash.com/photo-1602810318383-3e7a3a4f4b89",
imgShoes:"https://images.unsplash.com/photo-1600185365483-26d7a4cc5c6b",
link:"https://www.zalando.ch/sneaker/"
},
{
style:"Old Money",
gender:["Male","Female"],
age:["Young Adult","Adult"],
weather:["Cold","Warm"],
event:["Work","Date"],
score:9,
top:"Oxford Shirt",
bottom:"Tailored Pants",
shoes:"Loafers",
accessory:"Watch",
imgTop:"https://images.unsplash.com/photo-1521335629791-ce4aec67dd47",
imgBottom:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0",
imgShoes:"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
link:"https://www.zalando.ch/hemden/"
},
{
style:"Y2K",
gender:["Female","Unisex"],
age:["Teen","Young Adult"],
weather:["Warm","Hot"],
event:["Party","Date"],
score:7,
top:"Baby Tee",
bottom:"Low Rise Jeans",
shoes:"Platform Sneakers",
accessory:"Butterfly Necklace",
imgTop:"https://images.unsplash.com/photo-1520975682031-a3c9a6a8f5f3",
imgBottom:"https://images.unsplash.com/photo-1542272604-787c3835535d",
imgShoes:"https://images.unsplash.com/photo-1600180758890-6b6c8a6f1b73",
link:"https://www.asos.com/women/"
}
];

/* AI GENERATOR */
function generate(){

let gender=document.getElementById("gender").value;
let age=ageGroup(parseInt(document.getElementById("ageSelect").value));
let weather=document.getElementById("weather").value;
let event=document.getElementById("event").value;
let style=document.getElementById("style").value;

/* scoring system */
function scoreOutfit(o){
let score=0;

if(o.style===style) score+=5;
if(o.gender.includes(gender)) score+=3;
if(o.age.includes(age)) score+=3;
if(o.weather.includes(weather)) score+=3;
if(o.event.includes(event)) score+=4;
score+=o.score;

return score;
}

/* rank outfits */
let ranked=db
.map(o=>({o,score:scoreOutfit(o)}))
.sort((a,b)=>b.score-a.score)
.slice(0,3);

let html="";

ranked.forEach((item,i)=>{
let o=item.o;

html+=`
<div class="outfit">

<h3>AI Outfit ${i+1}</h3>
<div class="small">Match Score: ${item.score}</div>

<div class="item">
<b>Top:</b> ${o.top}
<img src="${o.imgTop}">
<a href="${o.link}" target="_blank">Buy Top</a>
</div>

<div class="item">
<b>Bottom:</b> ${o.bottom}
<img src="${o.imgBottom}">
<a href="${o.link}" target="_blank">Buy Bottom</a>
</div>

<div class="item">
<b>Shoes:</b> ${o.shoes}
<img src="${o.imgShoes}">
<a href="${o.link}" target="_blank">Buy Shoes</a>
</div>

<div class="small">
<a href="${o.link}" target="_blank">Shop Similar Items</a>
</div>

</div>
`;
});

document.getElementById("outfits").innerHTML=html;
}

</script>

</body>
</html>
