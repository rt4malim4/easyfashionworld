<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>easyfashionworld</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
overflow-x:hidden;
}

#sparkles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.sparkle{
position:absolute;
background:gold;
border-radius:50%;
box-shadow:0 0 10px gold;
animation:float linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120px);
opacity:0;
}
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:3rem;
color:gold;
margin-bottom:10px;
}

.header p{
color:#ccc;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:25px;
}

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,215,0,.15);
border-radius:20px;
padding:25px;
}

.card h2{
color:gold;
margin-bottom:15px;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
font-weight:600;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#1c1c1c;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.primary{
background:gold;
color:black;
}

.primary:hover{
transform:translateY(-2px);
}

.secondary{
background:#333;
color:white;
}

.outfits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.outfit{
background:rgba(255,255,255,.04);
padding:20px;
border-radius:18px;
border:1px solid rgba(255,215,0,.12);
}

.outfit h3{
color:gold;
margin-bottom:10px;
}

.outfit ul{
padding-left:20px;
}

.outfit li{
margin-bottom:6px;
}

.favoriteBtn{
margin-top:12px;
background:gold;
color:black;
}

.favoriteItem{
background:#1d1d1d;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:.9rem;
}

.empty{
text-align:center;
padding:20px;
color:#ccc;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
.header h1{
font-size:2.2rem;
}
}
</style>
</head>
<body>

<div id="sparkles"></div>

<div class="container">

<div class="header">
<h1>easyfashionworld</h1>
<p>Find your perfect outfit based on weather, event, age and style.</p>
</div>

<div class="grid">

<div class="card">

<h2>Fashion Planner</h2>

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Unisex</option>
</select>

<label>Age Group</label>
<select id="age">
<option>Teen (13-19)</option>
<option>Young Adult (20-30)</option>
<option>Adult (31-40)</option>
</select>

<label>Weather</label>
<select id="weather">
<option>Hot</option>
<option>Warm</option>
<option>Cold</option>
<option>Rainy</option>
</select>

<label>Event</label>
<select id="event">
<option>School</option>
<option>Work</option>
<option>Party</option>
<option>Date</option>
<option>Shopping</option>
<option>Sport</option>
</select>

<label>Style</label>
<select id="style">
<option>Casual</option>
<option>Sporty</option>
<option>Streetwear</option>
<option>Y2K</option>
</select>

<button class="primary" onclick="generateOutfits()">
Generate Outfits
</button>

<button class="secondary" onclick="generateOutfits()">
More Suggestions
</button>

<div style="margin-top:25px;">
<h2>Favorites ❤️</h2>
<div id="favoritesList"></div>
</div>

</div>

<div class="card">

<h2>Outfit Suggestions</h2>

<div id="results" class="outfits">
<div class="empty">
Choose your preferences and click "Generate Outfits".
</div>
</div>

</div>

</div>
</div>

<script>

const outfitDatabase = [

{
style:"Casual",
gender:"Male",
age:"Teen (13-19)",
weather:"Hot",
event:"School",
top:"Oversized Graphic Tee",
bottom:"Cargo Shorts",
shoes:"White Sneakers",
accessory:"Crossbody Bag",
colors:"Black + White"
},
{
style:"Casual",
gender:"Male",
age:"Young Adult (20-30)",
weather:"Warm",
event:"Shopping",
top:"Polo Shirt",
bottom:"Slim Jeans",
shoes:"Leather Sneakers",
accessory:"Silver Watch",
colors:"Beige + Navy"
},
{
style:"Casual",
gender:"Female",
age:"Teen (13-19)",
weather:"Hot",
event:"School",
top:"Baby Tee",
bottom:"Denim Shorts",
shoes:"Platform Sneakers",
accessory:"Mini Backpack",
colors:"Pink + White"
},
{
style:"Casual",
gender:"Female",
age:"Young Adult (20-30)",
weather:"Warm",
event:"Date",
top:"Knit Top",
bottom:"Wide Leg Pants",
shoes:"Fashion Sneakers",
accessory:"Shoulder Bag",
colors:"Cream + Beige"
},
{
style:"Streetwear",
gender:"Male",
age:"Teen (13-19)",
weather:"Warm",
event:"School",
top:"Oversized Hoodie",
bottom:"Cargo Pants",
shoes:"Chunky Sneakers",
accessory:"Chain Necklace",
colors:"Black + Red"
},
{
style:"Streetwear",
gender:"Female",
age:"Teen (13-19)",
weather:"Warm",
event:"Shopping",
top:"Oversized Tee",
bottom:"Baggy Jeans",
shoes:"Chunky Sneakers",
accessory:"Beanie",
colors:"Grey + Black"
},
{
style:"Streetwear",
gender:"Unisex",
age:"Young Adult (20-30)",
weather:"Cold",
event:"Shopping",
top:"Puffer Jacket",
bottom:"Wide Leg Pants",
shoes:"High Top Sneakers",
accessory:"Crossbody Bag",
colors:"Olive + Black"
},
{
style:"Y2K",
gender:"Female",
age:"Teen (13-19)",
weather:"Warm",
event:"Party",
top:"Baby Tee",
bottom:"Low Rise Jeans",
shoes:"Platform Sneakers",
accessory:"Butterfly Necklace",
colors:"Pink + Silver"
},
{
style:"Y2K",
gender:"Female",
age:"Young Adult (20-30)",
weather:"Hot",
event:"Date",
top:"Mesh Top",
bottom:"Cargo Skirt",
shoes:"Platform Boots",
accessory:"Mini Bag",
colors:"Purple + White"
},
{
style:"Y2K",
gender:"Unisex",
age:"Teen (13-19)",
weather:"Warm",
event:"Party",
top:"Cropped Hoodie",
bottom:"Parachute Pants",
shoes:"Chunky Trainers",
accessory:"Tinted Sunglasses",
colors:"Sky Blue + White"
},
{
style:"Sporty",
gender:"Male",
age:"Young Adult (20-30)",
weather:"Warm",
event:"Sport",
top:"Performance Tee",
bottom:"Training Shorts",
shoes:"Running Shoes",
accessory:"Sports Cap",
colors:"Black + Neon Green"
},
{
style:"Sporty",
gender:"Female",
age:"Young Adult (20-30)",
weather:"Warm",
event:"Sport",
top:"Training Crop Top",
bottom:"Leggings",
shoes:"Running Shoes",
accessory:"Smart Watch",
colors:"Grey + Pink"
},
{
style:"Sporty",
gender:"Unisex",
age:"Adult (31-40)",
weather:"Warm",
event:"Sport",
top:"Athletic Tee",
bottom:"Track Pants",
shoes:"Performance Trainers",
accessory:"Gym Bag",
colors:"Blue + White"
}
];

function createVariations(base){

const variations = [];

for(let i=0;i<3;i++){

variations.push({
top:base.top,
bottom:base.bottom,
shoes:base.shoes,
accessory:base.accessory,
colors:base.colors
});

}

return variations;
}

function generateOutfits(){

const gender =
document.getElementById("gender").value;

const age =
document.getElementById("age").value;

const weather =
document.getElementById("weather").value;

const event =
document.getElementById("event").value;

const style =
document.getElementById("style").value;

let matches = outfitDatabase.filter(item =>
item.gender === gender &&
item.age === age &&
item.weather === weather &&
item.event === event &&
item.style === style
);

if(matches.length === 0){

matches = outfitDatabase.filter(item =>
item.style === style
);

}

if(matches.length === 0){

document.getElementById("results").innerHTML =
"<div class='empty'>No outfits found.</div>";

return;
}

const base =
matches[Math.floor(Math.random()*matches.length)];

const outfit1 = {...base};

const outfit2 = {
...base,
accessory:"Fashion Watch",
colors:"Beige + White"
};

const outfit3 = {
...base,
accessory:"Statement Sunglasses",
colors:"Black + Gold"
};

const outfits = [outfit1,outfit2,outfit3];

let html = "";

outfits.forEach((o,index)=>{

html += `
<div class="outfit">

<h3>Outfit ${index+1}</h3>

<ul>
<li><strong>Top:</strong> ${o.top}</li>
<li><strong>Bottom:</strong> ${o.bottom}</li>
<li><strong>Shoes:</strong> ${o.shoes}</li>
<li><strong>Accessory:</strong> ${o.accessory}</li>
<li><strong>Color Combination:</strong> ${o.colors}</li>
</ul>

<button class="favoriteBtn"
onclick='saveFavorite(${JSON.stringify(JSON.stringify(o))})'>
❤️ Save Outfit
</button>

</div>
`;

});

document.getElementById("results").innerHTML = html;

}

function saveFavorite(outfit){

const parsed = JSON.parse(outfit);

let favorites =
JSON.parse(localStorage.getItem("easyfashionworldFavorites"))
|| [];

favorites.push(parsed);

localStorage.setItem(
"easyfashionworldFavorites",
JSON.stringify(favorites)
);

loadFavorites();

}

function loadFavorites(){

let favorites =
JSON.parse(localStorage.getItem("easyfashionworldFavorites"))
|| [];

let html = "";

favorites.forEach(item=>{

html += `
<div class="favoriteItem">

<strong>${item.top}</strong><br>
${item.bottom}<br>
${item.shoes}<br>
🎨 ${item.colors}

</div>
`;

});

document.getElementById("favoritesList").innerHTML = html;

}

loadFavorites();

for(let i=0;i<120;i++){

const sparkle =
document.createElement("div");

sparkle.classList.add("sparkle");

const size =
Math.random()*4+2;

sparkle.style.width =
size+"px";

sparkle.style.height =
size+"px";

sparkle.style.left =
Math.random()*100+"%";

sparkle.style.animationDuration =
(Math.random()*8+5)+"s";

sparkle.style.animationDelay =
(Math.random()*10)+"s";

document.getElementById("sparkles")
.appendChild(sparkle);

}

</script>

</body>
</html>
